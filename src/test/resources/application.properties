# H2 In-Memory Database Configuration
# 'DB_CLOSE_DELAY=-1' keeps the DB alive for the duration of the test run
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'create-drop' ensures a clean database schema for every test run
spring.jpa.hibernate.ddl-auto=create-drop
# Set to 'true' temporarily if you need to debug generated SQL queries during tests
spring.jpa.show-sql=false

# Persistence Settings
spring.jpa.open-in-view=false

# SQL Initialization
# Ensures the DB is populated from schema.sql/data.sql if present
spring.sql.init.mode=always